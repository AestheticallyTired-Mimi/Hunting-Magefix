<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://use.typekit.net/jwo8cgb.css">
</head>

<body>
    
    <div class="container">

        <header>
           <div class="head-left">
                <a href="index.html">
                    <img src="Assets/Logo Mark.png" alt="logo">
                </a>
           </div>
           <div class="head-right">
                <nav>
                    <a href="about.html"> About </a>
                    <a href="faelora.html"> Faelora </a>
                    <a href="guide.html"> Guide </a>
                    <a href="contact.html"> Contact </a>
                </nav>
            </div>
        </header>

        <div id="particle-container"></div>

        <section class="contact-section">
            <h3>Leave a Note in the Witch's Journal</h3>
            <div class="contact-grid">
                <div class="contact-cards">
                    <video autoplay loop muted inline-plays>
                        <source src="Assets/Hero Section - 2.mp4" class="contact-video">
                    </video>
                </div>
                <div class="contact-cards">
                    <form method="POST">
                        <label for="name">Your Name:</label><br><br>
                        <input type="text" id="name" name="Enter Your Name"><br><br>
                        <label for="email">Your Email:</label><br><br>
                        <input type="text" id="email" name="Enter Your Email"><br><br>
                        <label for="message">Message:</label><br><br>
                        <textarea id="messge" name="message"></textarea><br><br>
                        <input type="submit" value="Submit" id="submit">
                    </form>
                </div>
            </div>
        </section>

    </div>

    <script src="js/web.js"></script>

    <footer>
        <p>&copy; 2024 Hunting Mage. All rights reserved.</p>
    </footer>

</body>
</html>
